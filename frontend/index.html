<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentForge | Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>AgentForge<span class="dot">.</span></h1>
            <p>Describe your workflow. We build the agent.</p>
        </header>

        <main id="workspace">
            <div id="loading-state" class="hidden">
                <div class="spinner"></div>
                <p>Forging your agent...</p>
            </div>
            <div id="agents-grid">
                </div>
        </main>

        <div class="command-bar">
            <input type="text" id="prompt-input" placeholder="e.g., I'm in HR. I need an agent to read resumes and slack me the top 3 skills..." autocomplete="off">
            <button id="build-btn">Build</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
