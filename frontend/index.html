<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentForge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
</head>
<body>
    <div class="liquid-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div id="auth-view" class="auth-wrapper">
        <div class="auth-card glass-panel">
            <h1>AgentForge<span class="dot">.</span></h1>
            <p id="auth-subtitle">Welcome. Let's build something incredible.</p>
            
            <form id="auth-form">
                <input type="text" id="auth-name" placeholder="Full Name" class="hidden premium-input">
                <input type="email" id="auth-email" placeholder="Email Address" class="premium-input" required>
                <input type="password" id="auth-password" placeholder="Password" class="premium-input" required>
                <button type="submit" id="auth-submit-btn" class="primary-btn">Sign In</button>
            </form>
            
            <div class="auth-toggle">
                <span id="auth-toggle-text">Don't have an account?</span> 
                <a href="#" id="auth-toggle-link">Create one</a>
            </div>
            <div id="auth-error" class="hidden"></div>
        </div>
    </div>

    <div id="app-layout" class="app-layout hidden">
        <aside class="sidebar glass-panel">
            <div class="sidebar-header">
                <h2>AgentForge<span class="dot">.</span></h2>
                <div class="user-profile">
                    <span id="user-greeting">Welcome</span>
                    <button id="logout-btn" class="ghost-btn">Log out</button>
                </div>
                
                <div class="sidebar-tabs">
                    <button id="tab-my-workspace" class="tab-btn active">My Agents</button>
                    <button id="tab-marketplace" class="tab-btn">Marketplace</button>
                </div>

                <button id="new-agent-btn" class="primary-btn">+ New Agent</button>
            </div>
            <div class="sidebar-list" id="agent-list">
                </div>
        </aside>

        <main class="main-content">
            <div id="build-view" class="workspace-view">
                <div class="builder-container">
                    <header class="workspace-header">
                        <h1>Forge an Agent</h1>
                        <p>Describe what you want to automate. We'll handle the complex engineering.</p>
                    </header>
                    <div class="command-bar">
                        <textarea id="prompt-input" placeholder="e.g., Build an assistant that reads legal contracts and extracts the hidden fees..." autocomplete="off"></textarea>
                        <div class="command-footer">
                            <span class="cmd-hint">↵ Press Enter to forge</span>
                            <button id="build-btn" class="primary-btn pulse-hover">Forge</button>
                        </div>
                    </div>
                    <div id="loading-state" class="hidden">
                        <div class="spinner"></div>
                        <p>Architecting your AI...</p>
                    </div>
                </div>
            </div>

            <div id="run-view" class="workspace-view hidden">
                <div id="active-agent-container" class="active-agent-wrapper"></div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
